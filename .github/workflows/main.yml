name: Screenshot Archiver

on:
  push:
    branches:
      - main

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Archive URLs (capture shorts correctly)
        run: |
          cat << 'EOF' > archiver.js
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');

          function makeSafeName(url) {
            return url.replace(/[^a-z0-9]/gi, '_').toLowerCase().slice(0, 80);
          }

          async function captureShorts(page, outDir) {
            let index = 0;
            let noNewCount = 0;

            while (noNewCount < 5) {
              const filePath = path.join(
                outDir,
                `short_${String(index).padStart(3, '0')}.png`
              );

              await page.screenshot({
                path: filePath,
                fullPage: false
              });

              index++;

              const previousScroll = await page.evaluate(() => window.scrollY);

              await page.evaluate(() => {
                window.scrollBy(0, window.innerHeight * 0.9);
              });

              await page.waitForTimeout(2500);

              const newScroll = await page.evaluate(() => window.scrollY);

              if (newScroll === previousScroll) {
                noNewCount++;
              } else {
                noNewCount = 0;
              }
            }
          }

          (async () => {
            const url = process.argv[2];
            if (!url) {
              console.error('No URL provided');
              process.exit(1);
            }

            const outDir = path.join('downloads', makeSafeName(url));
            fs.mkdirSync(outDir, { recursive: true });

            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({
              viewport: { width: 1280, height: 800 }
            });

            await page.goto(url, { waitUntil: 'networkidle' });

            // Initial wait for shorts UI
            await page.waitForTimeout(4000);

            await captureShorts(page, outDir);

            await browser.close();
          })();
          EOF

          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -q "\[skip ci\]"; then
            echo "Skipping archive step"
            exit 0
          fi

          URLS=$(echo "$COMMIT_MSG" | grep -oE 'https?://[^ ]+')

          for URL in $URLS; do
            node archiver.js "$URL" || true
          done

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads || true
          git commit -m "Archive shorts screenshots" || true
          git push || true
